<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BLACK AND WHITE TEARS</title>
  <!-- Icône iPhone / raccourci écran d’accueil -->
  <link rel="apple-touch-icon" href=«icon.jpg">
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }
    body{
      background:black;
      color:white;
      font-family:Arial, Helvetica, sans-serif;
      text-align:center;
    }
    header{
      padding:60px 20px 40px;
    }
    h1{
      font-size:3rem;
      letter-spacing:6px;
      margin-bottom:20px;
    }
    .subtitle{
      color:#bbbbbb;
      max-width:700px;
      margin:auto;
      line-height:1.7;
      font-size:1.1rem;
    }
    .gallery{
      display:flex;
      flex-direction:column;
      gap:40px;
      padding:40px 20px 80px;
      max-width:1000px;
      margin:auto;
    }
    .photo{
      background:#111;
      padding:10px;
      border:1px solid #222;
    }
    .photo img{
      width:100%;
      display:block;
    }
    footer{
      padding:30px;
      color:#666;
      font-size:0.9rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>BLACK AND WHITE TEARS</h1>
    <p class="subtitle">
      A parallel wildlife universe where majestic creatures evolve
      with sacred black-and-white zebra patterns.
    </p>
  </header>
  <section class="gallery">
    <div class="photo">
      <img src="lion.jpg" alt="Zebra Lion">
    </div>
    <div class="photo">
      <img src="elephant.jpg" alt="Zebra Elephant">
    </div>
  </section>
  <footer>
    BLACK AND WHITE TEARS © 2026
  </footer>
</body>
</html>
