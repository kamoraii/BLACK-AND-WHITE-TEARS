<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>BLACK AND WHITE TEARS</title>
  <!-- SEO / Référencement -->
  <meta name="description" content="Galerie artistique immersive BLACK AND WHITE TEARS. Animaux de la savane évoluant avec des motifs zèbres. Photoréalisme, élégance, dualité.">
  <meta name="robots" content="index, follow">
  <meta name="author" content="meda's">
  <meta name="copyright" content="© Black and White Tears by meda's">
  <link rel="canonical" href="https://kamoraii.github.io/BLACK-AND-WHITE-TEARS/">
  <!-- Open Graph / Facebook -->
  <meta property="og:title" content="BLACK AND WHITE TEARS">
  <meta property="og:image" content="https://kamoraii.github.io/BLACK-AND-WHITE-TEARS/main-image.jpg">
  <meta property="og:description" content="A parallel wildlife universe where majestic creatures evolve with sacred black-and-white zebra patterns.">
  <!-- Icône iPhone -->
  <link rel="apple-touch-icon" href="icon.jpg">
  <!-- Polices -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Infant:wght@300;400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    /* RESET & CORRECTION DÉBORDEMENT */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      background: #000000;
      color: #ffffff;
      overflow-x: hidden;
      width: 100%;
      max-width: 100%;
      position: relative;
    }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadein 1.8s ease both;
      padding: 0 24px 65px;
      overflow-y: auto;
      overflow-x: hidden;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    body::-webkit-scrollbar {
      display: none;
    }
    * {
      max-width: 100%;
    }
    @keyframes fadein {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* LOGO */
    .logo-block {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-top: 18px;
      margin-bottom: 24px;
    }
    .logo {
      width: 100%;
      max-width: 640px;
      height: auto;
      display: block;
    }

    /* BREATHE - position remontée significativement */
    .breathe-block {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-bottom: 52px;   /* valeur forte pour bien remonter */
      position: relative;
    }
    .breathe-link {
      text-decoration: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.70rem;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.34);
      font-weight: 300;
      display: inline-block;
      position: relative;
      -webkit-tap-highlight-color: transparent;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    /* Pulsation plus lumineuse au pic */
    .breathe-link.pulse {
      animation: gentlePulse 1.8s ease-in-out infinite;
    }
    @keyframes gentlePulse {
      0% { 
        opacity: 0.3;
        text-shadow: none;
      }
      50% { 
        opacity: 1;
        text-shadow: 0 0 2px rgba(255,255,255,0.3);
      }
      100% { 
        opacity: 0.3;
        text-shadow: none;
      }
    }
    /* Zone cliquable élargie */
    .breathe-link::before {
      content: '';
      position: absolute;
      top: -14px;
      left: -28px;
      right: -28px;
      bottom: -14px;
      z-index: 1;
    }
    .breathe-link:active {
      opacity: 0.8 !important;
      animation: none !important;
    }

    /* IMAGE PRINCIPALE */
    .image-block {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-bottom: 42px;
    }
    .main-image {
      width: 100%;
      max-width: 940px;
      aspect-ratio: 1/1;
      object-fit: cover;
      display: block;
    }

    /* CITATION */
    .citation-block {
      max-width: 760px;
      text-align: center;
      margin-bottom: 38px;
      padding: 0 10px;
    }
    .quote {
      font-family: 'Cormorant Infant', serif;
      font-size: clamp(1.55rem, 4vw, 2.5rem);
      line-height: 1.65;
      letter-spacing: 0.01em;
      color: #f1f1f1;
      margin-bottom: 18px;
      font-weight: 300;
      font-style: italic;
    }
    .author {
      font-family: 'Inter', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.52);
      font-weight: 300;
    }

    /* COPYRIGHT */
    .copyright {
      margin-top: 30px;
      text-align: center;
      font-family: 'Inter', sans-serif;
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      color: rgba(255, 255, 255, 0.22);
      font-weight: 300;
    }

    @media (max-width: 768px) {
      .logo-block {
        margin-top: 8px;
        margin-bottom: 20px;
      }
      .breathe-block {
        margin-bottom: 52px;  /* identique mobile */
      }
      .image-block {
        margin-bottom: 34px;
      }
      .citation-block {
        margin-bottom: 30px;
      }
    }
  </style>
</head>
<body>

  <div class="logo-block">
    <img src="logo.jpg" class="logo" alt="BLACK AND WHITE TEARS" loading="eager">
  </div>

  <div class="breathe-block">
    <a href="page2.html" class="breathe-link" id="breatheLink" rel="noopener">
      breathe
    </a>
  </div>

  <div class="image-block">
    <img src="main-image.jpg" class="main-image" alt="BLACK AND WHITE TEARS" loading="eager">
  </div>

  <div class="citation-block">
    <div class="quote">
      “L’évolution est une ascension vers la conscience.”
    </div>
    <div class="author">
      — Pierre Teilhard de Chardin
    </div>
  </div>

  <div class="copyright">
    © Black and White Tears by meda’s
  </div>

  <script>
    (function() {
      const breatheLink = document.getElementById('breatheLink');
      if (!breatheLink) return;

      const hasVisited = sessionStorage.getItem('breathe_visited');

      if (hasVisited) {
        breatheLink.style.opacity = '1';
        breatheLink.classList.add('pulse');
      } else {
        breatheLink.style.opacity = '0';
        setTimeout(function() {
          breatheLink.style.opacity = '1';
          breatheLink.classList.add('pulse');
          sessionStorage.setItem('breathe_visited', 'true');
        }, 3800);
      }
    })();
  </script>
</body>
</html>
