<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLACK AND WHITE TEARS</title>
<!-- Icône iPhone -->
<link rel="apple-touch-icon" href="icon.jpg">
<!-- Polices -->
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}
body{
background:black;
color:white;
font-family:'Cormorant Garamond', serif;
overflow-x:hidden;
}
.hero{
position:relative;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:40px 20px;
overflow:hidden;
}
.hero img{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:cover;
opacity:0.30;
}
.overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,0.65);
}
.content{
position:relative;
z-index:2;
max-width:950px;
}
h1{
font-size:4rem;
letter-spacing:10px;
margin-bottom:50px;
font-weight:300;
}
.quote{
font-size:2rem;
line-height:1.7;
font-family:'Great Vibes', cursive;
margin-bottom:40px;
}
.translation{
font-size:1.4rem;
line-height:1.8;
color:#d0d0d0;
font-style:italic;
margin-bottom:50px;
}
.signature{
font-size:2rem;
font-family:'Great Vibes', cursive;
margin-bottom:60px;
}
.enter{
display:inline-block;
padding:15px 40px;
border:1px solid white;
color:white;
text-decoration:none;
letter-spacing:4px;
transition:0.3s;
}
.enter:hover{
background:white;
color:black;
}
@media(max-width:768px){
h1{
font-size:2.3rem;
letter-spacing:5px;
}
.quote{
font-size:1.5rem;
}
.translation{
font-size:1.1rem;
}
.signature{
font-size:1.6rem;
}
}
</style>
</head>
<body>
<section class="hero">
<!-- IMAGE PAGE D’ACCUEIL -->
<img src="image1.jpg" alt="BLACK AND WHITE TEARS">
<div class="overlay"></div>
<div class="content">
<h1>BLACK AND WHITE TEARS</h1>
<div class="quote">
“From so simple a beginning endless forms most beautiful have been, and are being, evolved.”
</div>
<div class="translation">
« À partir d’un commencement si simple,
une infinité de formes parmi les plus belles
ont évolué, et continuent d’évoluer. »
</div>
<div class="signature">
— Charles Darwin
</div>
<a href="page2.html" class="enter">
ENTER
</a>
</div>
</section>
</body>
</html>
